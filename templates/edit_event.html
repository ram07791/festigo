<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Event | Festigo</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/edit_event.css') }}">
</head>

<body>

<!-- PAGE TITLE -->
<div class="page-title">Edit Event Details</div>

<!-- FORM CONTAINER -->
<div class="form-container">

    <!-- UPDATE FORM -->
    <form action="{{ url_for('edit_event', event_id=event.event_id) }}" method="POST">

        <!-- TITLE -->
        <div class="form-group">
            <label>Title</label>
            <input type="text" name="title" value="{{ event.event_title }}" required>
        </div>

        <!-- DESCRIPTION -->
        <div class="form-group">
            <label>Description</label>
            <textarea name="description" required>{{ event.event_description }}</textarea>
        </div>

        <!-- LOCATION -->
        <div class="form-group">
            <label>Venue</label>
            <input type="text" name="location" value="{{ event.location }}" required>
        </div>

        <!-- DATE & TIME -->
        <div class="form-group">
            <label>Date & Time</label>
            <input type="datetime-local"
                   name="date"
                   value="{{ event.event_date.strftime('%Y-%m-%dT%H:%M') }}"
                   required>
        </div>

        <!-- SEATS -->
        <div class="form-group">
            <label>Seats</label>
            <input type="number" name="seats" value="{{ event.event_seats }}" required>
        </div>

        <!-- PRICE -->
        <div class="form-group">
            <label>Ticket Price ($)</label>
            <input type="number" name="price" value="{{ event.event_price }}" required>
        </div>

        <!-- SUBMIT BUTTON -->
        <button type="submit" class="update-btn">
            Update Event
        </button>

    </form>
</div>

<!-- DELETE EVENT SECTION -->
<div class="delete-container">

    <h3>Delete Event</h3>

    <p class="delete-warning">
        Deleting this event will permanently remove it from the system.
        This action cannot be undone.
    </p>

    <!-- ✅ FIXED DELETE FORM -->
    <form action="{{ url_for('delete_event', event_id=event.event_id) }}" method="POST">

        <button type="submit"
                class="delete-btn"
                onclick="return confirm('Are you sure you want to delete this event?');">
            Delete Event
        </button>

    </form>

</div>

</body>
</html>
